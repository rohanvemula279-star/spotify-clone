name: Build Android APK

# Builds an installable debug APK on every push to main, and whenever you
# trigger it manually from the Actions tab. The finished APK is attached to
# the run as a downloadable artifact — no Android tooling needed on your PC.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed so the job can commit the built APK back into public/ for the website.
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build static web export
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotube-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish the APK into the web app so the deployed website (Vercel) can
      # serve it at /spotube.apk for the "Download APK" button. We commit it
      # back to main with [skip ci] so this build doesn't trigger itself.
      - name: Publish APK to website
        run: cp android/app/build/outputs/apk/debug/app-debug.apk public/spotube.apk

      - name: Commit APK back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/spotube.apk
          if git diff --staged --quiet; then
            echo "APK unchanged — nothing to commit."
          else
            git commit -m "chore: publish APK to website [skip ci]"
            git push
          fi
